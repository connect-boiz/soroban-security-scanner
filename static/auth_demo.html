<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soroban Authentication Service Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 2rem;
            font-size: 1.8rem;
        }

        .tabs {
            display: flex;
            margin-bottom: 2rem;
            border-bottom: 1px solid #eee;
        }

        .tab {
            flex: 1;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 1rem;
            color: #666;
            transition: all 0.3s ease;
        }

        .tab.active {
            color: #667eea;
            border-bottom: 2px solid #667eea;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background: #5a6fd8;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .message {
            padding: 1rem;
            border-radius: 5px;
            margin-bottom: 1rem;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .status-info {
            background: #f8f9fa;
            padding: 1rem;
            border-radius: 5px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .status-info h3 {
            margin-bottom: 0.5rem;
            color: #333;
        }

        .status-info p {
            color: #666;
            margin-bottom: 0.25rem;
        }

        .demo-credentials {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            padding: 1rem;
            border-radius: 5px;
            margin-bottom: 1rem;
        }

        .demo-credentials h4 {
            color: #856404;
            margin-bottom: 0.5rem;
        }

        .demo-credentials p {
            color: #856404;
            margin-bottom: 0.25rem;
            font-family: monospace;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .api-response {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            padding: 1rem;
            border-radius: 5px;
            margin-top: 1rem;
            font-family: monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Soroban Auth Service Demo</h1>
        
        <div class="demo-credentials">
            <h4>Demo Credentials:</h4>
            <p>Admin: admin@example.com / admin123!</p>
            <p>User: user@example.com / user123!</p>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="showTab('login')">Login</button>
            <button class="tab" onclick="showTab('register')">Register</button>
            <button class="tab" onclick="showTab('status')">Status</button>
            <button class="tab" onclick="showTab('protected')">Protected</button>
        </div>

        <div id="message" class="message"></div>

        <!-- Login Tab -->
        <div id="login-tab" class="tab-content active">
            <form id="login-form">
                <div class="form-group">
                    <label for="login-email">Email:</label>
                    <input type="email" id="login-email" value="admin@example.com" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Password:</label>
                    <input type="password" id="login-password" value="admin123!" required>
                </div>
                <button type="submit">Login</button>
            </form>
        </div>

        <!-- Register Tab -->
        <div id="register-tab" class="tab-content">
            <form id="register-form">
                <div class="form-group">
                    <label for="register-email">Email:</label>
                    <input type="email" id="register-email" required>
                </div>
                <div class="form-group">
                    <label for="register-password">Password:</label>
                    <input type="password" id="register-password" required>
                </div>
                <div class="form-group">
                    <label for="register-name">Name (Optional):</label>
                    <input type="text" id="register-name">
                </div>
                <button type="submit">Register</button>
            </form>
        </div>

        <!-- Status Tab -->
        <div id="status-tab" class="tab-content">
            <div class="form-group">
                <label for="status-email">Email:</label>
                <input type="email" id="status-email" value="admin@example.com" required>
            </div>
            <button onclick="checkStatus()">Check Status</button>
            <div id="status-result"></div>
        </div>

        <!-- Protected Tab -->
        <div id="protected-tab" class="tab-content">
            <div class="status-info">
                <h3>Authentication Required</h3>
                <p>This tab demonstrates protected endpoints that require authentication.</p>
                <p>Current status: <span id="auth-status">Not authenticated</span></p>
            </div>
            
            <button onclick="testProfile()">Test Profile Endpoint</button>
            <button onclick="testAdminUsers()">Test Admin Users</button>
            <button onclick="testRateLimit()">Test Rate Limiting</button>
            
            <div id="protected-result"></div>
        </div>
    </div>

    <script>
        let authToken = null;
        let sessionId = null;

        // Tab switching
        function showTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });

            // Show selected tab
            document.getElementById(tabName + '-tab').classList.add('active');
            event.target.classList.add('active');
        }

        // Message display
        function showMessage(message, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = message;
            messageEl.className = `message ${type}`;
            messageEl.style.display = 'block';
            
            setTimeout(() => {
                messageEl.style.display = 'none';
            }, 5000);
        }

        // API helper
        async function apiCall(url, options = {}) {
            try {
                const response = await fetch(url, {
                    headers: {
                        'Content-Type': 'application/json',
                        ...(authToken && { 'Authorization': `Bearer ${authToken}` }),
                        ...options.headers
                    },
                    ...options
                });

                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || `HTTP ${response.status}`);
                }
                
                return data;
            } catch (error) {
                throw error;
            }
        }

        // Login form
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            
            try {
                const data = await apiCall('/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({ email, password })
                });
                
                authToken = data.token;
                sessionId = data.session_id;
                
                showMessage(`Login successful! Welcome ${data.user.email}`, 'success');
                updateAuthStatus();
                
                console.log('Login response:', data);
                
            } catch (error) {
                showMessage(`Login failed: ${error.message}`, 'error');
                console.error('Login error:', error);
            }
        });

        // Register form
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            const name = document.getElementById('register-name').value;
            
            try {
                const data = await apiCall('/auth/register', {
                    method: 'POST',
                    body: JSON.stringify({ email, password, name })
                });
                
                showMessage(`Registration successful! You can now login as ${data.user.email}`, 'success');
                console.log('Register response:', data);
                
            } catch (error) {
                showMessage(`Registration failed: ${error.message}`, 'error');
                console.error('Register error:', error);
            }
        });

        // Check status
        async function checkStatus() {
            const email = document.getElementById('status-email').value;
            
            try {
                const data = await apiCall(`/auth/status/${encodeURIComponent(email)}`);
                
                const resultEl = document.getElementById('status-result');
                resultEl.innerHTML = `
                    <div class="api-response">${JSON.stringify(data, null, 2)}</div>
                `;
                
                showMessage('Status retrieved successfully', 'success');
                
            } catch (error) {
                showMessage(`Status check failed: ${error.message}`, 'error');
                console.error('Status error:', error);
            }
        }

        // Test protected endpoints
        async function testProfile() {
            if (!authToken) {
                showMessage('Please login first', 'error');
                return;
            }
            
            try {
                const data = await apiCall('/api/profile');
                
                const resultEl = document.getElementById('protected-result');
                resultEl.innerHTML = `
                    <h4>Profile Response:</h4>
                    <div class="api-response">${JSON.stringify(data, null, 2)}</div>
                `;
                
                showMessage('Profile endpoint accessed successfully', 'success');
                
            } catch (error) {
                showMessage(`Profile access failed: ${error.message}`, 'error');
                console.error('Profile error:', error);
            }
        }

        async function testAdminUsers() {
            if (!authToken) {
                showMessage('Please login first', 'error');
                return;
            }
            
            try {
                const data = await apiCall('/api/admin/users');
                
                const resultEl = document.getElementById('protected-result');
                resultEl.innerHTML = `
                    <h4>Admin Users Response:</h4>
                    <div class="api-response">${JSON.stringify(data, null, 2)}</div>
                `;
                
                showMessage('Admin users endpoint accessed successfully', 'success');
                
            } catch (error) {
                showMessage(`Admin users access failed: ${error.message}`, 'error');
                console.error('Admin users error:', error);
            }
        }

        async function testRateLimit() {
            try {
                const data = await apiCall('/api/limited');
                
                const resultEl = document.getElementById('protected-result');
                resultEl.innerHTML = `
                    <h4>Rate Limited Response:</h4>
                    <div class="api-response">${JSON.stringify(data, null, 2)}</div>
                `;
                
                showMessage('Rate limited endpoint accessed successfully', 'success');
                
            } catch (error) {
                showMessage(`Rate limited endpoint failed: ${error.message}`, 'info');
                console.error('Rate limit error:', error);
            }
        }

        // Update authentication status
        function updateAuthStatus() {
            const statusEl = document.getElementById('auth-status');
            if (authToken) {
                statusEl.textContent = 'Authenticated';
                statusEl.style.color = '#28a745';
            } else {
                statusEl.textContent = 'Not authenticated';
                statusEl.style.color = '#dc3545';
            }
        }

        // Initialize
        updateAuthStatus();
        
        // Test rate limiting by making multiple rapid requests
        async function testRateLimiting() {
            showMessage('Testing rate limiting with 5 rapid requests...', 'info');
            
            for (let i = 0; i < 5; i++) {
                try {
                    await apiCall('/api/limited');
                    console.log(`Request ${i + 1}: Success`);
                } catch (error) {
                    console.log(`Request ${i + 1}: Failed - ${error.message}`);
                    showMessage(`Rate limiting activated after ${i + 1} requests`, 'info');
                    break;
                }
            }
        }
    </script>
</body>
</html>
