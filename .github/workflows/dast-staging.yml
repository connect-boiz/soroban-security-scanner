name: DAST - Dynamic Application Security Testing

on:
  deployment_status:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Staging environment URL'
        required: true
        default: 'https://staging.soroban-security-scanner.io'
  schedule:
    - cron: '0 8 * * 1'

jobs:
  owasp-zap-scan:
    name: OWASP ZAP DAST Scan
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Determine target URL
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "url=${{ github.event.inputs.target_url }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "deployment_status" ]; then
            echo "url=${{ github.event.deployment_status.target_url }}" >> $GITHUB_OUTPUT
          else
            echo "url=https://staging.soroban-security-scanner.io" >> $GITHUB_OUTPUT
          fi

      - name: Baseline Scan
        id: zap-baseline
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ steps.target.outputs.url }}
          rules_file_name: security/config/zap-rules.tsv
          cmd_options: '-I'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Full Active Scan
        uses: zaproxy/action-full-scan@v0.14.0
        with:
          target: ${{ steps.target.outputs.url }}
          rules_file_name: security/config/zap-rules.tsv
          cmd_options: '-I -a -j -T 10'
          token: ${{ secrets.GITHUB_TOKEN }}
          allow_issue_writing: false

      - name: Generate DAST Report
        if: always()
        run: |
          mkdir -p security/reports/dast
          if [ -f zap_report.html ]; then
            mv zap_report.html security/reports/dast/zap-report.html
          fi
          if [ -f zap_report.json ]; then
            mv zap_report.json security/reports/dast/zap-report.json
          fi

      - name: Upload DAST report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dast-zap-report
          path: security/reports/dast/

      - name: Evaluate DAST results
        id: dast-eval
        run: node security/scripts/evaluate-dast-results.js
        env:
          ZAP_REPORT_PATH: security/reports/dast/zap-report.json

      - name: Post DAST status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let passed = true;
            let summary = 'DAST scan completed';
            try {
              if (fs.existsSync('security/reports/dast/dast-evaluation.json')) {
                const eval = JSON.parse(fs.readFileSync('security/reports/dast/dast-evaluation.json', 'utf8'));
                passed = eval.passed;
                summary = eval.summary;
              }
            } catch (e) {}

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: passed ? 'success' : 'failure',
              context: 'DAST Security Scan',
              description: summary
            });

            if (!passed) {
              core.setFailed('DAST scan failed: high-severity findings detected');
            }

  api-security-test:
    name: API Security Testing
    runs-on: ubuntu-latest
    needs: owasp-zap-scan
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install API security tools
        run: npm install -g @stoplight/spectral-cli

      - name: Validate OpenAPI spec
        run: |
          if [ -f docs/openapi.yaml ]; then
            spectral lint docs/openapi.yaml --fail-severity=error
          else
            echo "No OpenAPI spec found, skipping API validation"
          fi
        continue-on-error: true
