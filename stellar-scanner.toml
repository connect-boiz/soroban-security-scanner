# Stellar Security Scanner Configuration

[scan_paths]
paths = ["./contracts", "./src", "./examples"]

[ignore_paths]
paths = ["./target", "./node_modules", "./.git", "./tests"]

[vulnerability_checks]
enabled_checks = [
    "missing_access_control",
    "infinite_mint",
    "reentrancy",
    "integer_overflow",
    "unauthorized_mint",
    "unauthorized_burn",
    "weak_access_control",
    "frozen_funds",
    "broken_invariant"
]
disabled_checks = []
severity_threshold = "low"

[invariant_checks]
enabled_rules = [
    "total_supply_consistency",
    "balance_non_negative",
    "transfer_conservation",
    "no_negative_balances",
    "sum_of_balances_equals_supply"
]
disabled_rules = []
auto_fix = false

[output]
format = "console"
verbose = true
include_recommendations = true
include_code_snippets = false

[performance]
parallel_jobs = 4
timeout_seconds = 300
max_file_size_mb = 10
cache_results = true
