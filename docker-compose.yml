version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: soroban-scanner-db
    environment:
      POSTGRES_DB: soroban_scanner
      POSTGRES_USER: scanner_user
      POSTGRES_PASSWORD: scanner_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - soroban-scanner-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: soroban-scanner-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - soroban-scanner-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://scanner_user:scanner_pass@postgres:5432/soroban_scanner
      REDIS_URL: redis://redis:6379
      SESSION_MODE: stateless
      SESSION_STORE_URL: redis://session-store:6379
      SESSION_SIGNING_KEY: change-me-in-production
      RUST_LOG: debug
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
      - session-store
    networks:
      - soroban-scanner-network
    volumes:
      - ./backend:/app

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - soroban-scanner-network
    volumes:
      - ./frontend:/app
      - /app/node_modules

  # Core Scanner Service
  core-scanner:
    build:
      context: ./core-scanner
      dockerfile: Dockerfile
    environment:
      RUST_LOG: debug
    ports:
      - "8081:8081"
    networks:
      - soroban-scanner-network
    volumes:
      - ./core-scanner:/app

  # External Session Store (stateless auth/session metadata)
  session-store:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6380:6379"
    volumes:
      - session_store_data:/data
    networks:
      - soroban-scanner-network

volumes:
  postgres_data:
  redis_data:
  session_store_data:

networks:
  soroban-scanner-network:
    driver: bridge
