apiVersion: apps/v1
kind: Deployment
metadata:
  name: scanner-api
  labels:
    app: stellar-security-scanner
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: stellar-security-scanner
      component: api
  template:
    metadata:
      labels:
        app: stellar-security-scanner
        component: api
    spec:
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app: stellar-security-scanner
            component: api
      containers:
      - name: api
        image: stellar-security-scanner-api:latest
        ports:
        - containerPort: 8080
        env:
        - name: SESSION_MODE
          value: stateless
        - name: SESSION_STORE_URL
          value: redis://session-store:6379

---
apiVersion: v1
kind: Service
metadata:
  name: scanner-api-service
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
spec:
  selector:
    app: stellar-security-scanner
    component: api
  sessionAffinity: None
  externalTrafficPolicy: Cluster
  ports:
  - port: 80
    targetPort: 8080
  type: LoadBalancer
