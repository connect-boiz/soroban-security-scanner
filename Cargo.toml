[package]
name = "stellar-security-scanner"
version = "0.1.0"
edition = "2021"
authors = ["Security Scanner Team"]
description = "Security and invariant scanners for Stellar smart contracts"
license = "MIT"
keywords = ["stellar", "soroban", "security", "auditing", "invariants"]

[dependencies]
soroban-sdk = "25.3.0"
syn = { version = "2.0", features = ["full", "extra-traits"] }
proc-macro2 = "1.0"
quote = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
clap = { version = "4.0", features = ["derive"] }
regex = "1.0"
colored = "2.0"
anyhow = "1.0"
thiserror = "1.0"
walkdir = "2.0"
tokio = { version = "1.0", features = ["full"] }
futures = "0.3"
chrono = { version = "0.4", features = ["serde"] }
toml = "0.8"
num_cpus = "1.0"

[dev-dependencies]
tempfile = "3.0"
pretty_assertions = "1.0"

[[bin]]
name = "stellar-scanner"
path = "src/main.rs"

[lib]
name = "stellar_security_scanner"
path = "src/lib.rs"
