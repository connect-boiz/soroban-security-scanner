[package]
name = "stellar-security-scanner"
version = "0.1.0"
edition = "2021"
authors = ["Security Scanner Team"]
description = "Security and invariant scanners for Stellar smart contracts"
license = "MIT"
keywords = ["stellar", "soroban", "security", "auditing", "invariants"]

[dependencies]
soroban-sdk = "25.3.0"
syn = { version = "2.0", features = ["full", "extra-traits"] }
proc-macro2 = "1.0"
quote = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
clap = { version = "4.0", features = ["derive"] }
regex = "1.0"
colored = "2.0"
anyhow = "1.0"
thiserror = "1.0"
walkdir = "2.0"
tokio = { version = "1.0", features = ["full"] }
futures = "0.3"
chrono = { version = "0.4", features = ["serde"] }
toml = "0.8"
num_cpus = "1.0"

# Kubernetes dependencies
kube = { version = "0.88.0", features = ["runtime", "client"] }
k8s-openapi = { version = "0.21.0", features = ["v1_28"] }
tokio-util = "0.7"
base64 = "0.21"
uuid = { version = "1.0", features = ["v4"] }

# Stellar RPC and Time Travel Debugger dependencies
reqwest = { version = "0.11", features = ["json"] }
lru = "0.12"
hex = "0.4"
ed25519-dalek = "2.0"
sha2 = "0.10"

[dev-dependencies]
tempfile = "3.0"
pretty_assertions = "1.0"

[[bin]]
name = "stellar-scanner"
path = "src/main.rs"

[lib]
name = "stellar_security_scanner"
path = "src/lib.rs"
