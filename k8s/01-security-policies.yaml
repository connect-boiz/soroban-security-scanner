---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: scanner-egress-block
  namespace: stellar-security-scanner
spec:
  podSelector: {}
  policyTypes:
  - Egress
  - Ingress
  ingress:
  # Allow ingress from API server and same namespace
  - from:
    - namespaceSelector:
        matchLabels:
          name: stellar-security-scanner
    - namespaceSelector:
        matchLabels:
          name: kube-system
  egress:
  # Block all egress by default - this prevents data leakage
  - to:
    - namespaceSelector:
        matchLabels:
          name: stellar-security-scanner
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
  # Allow DNS resolution within namespace only
---
apiVersion: policy/v1
kind: ResourceQuota
metadata:
  name: scanner-global-quota
  namespace: stellar-security-scanner
spec:
  hard:
    requests.cpu: "10"
    requests.memory: 20Gi
    limits.cpu: "20"
    limits.memory: 40Gi
    pods: "50"
    count/pods: "50"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: scanner-limits
  namespace: stellar-security-scanner
spec:
  limits:
  - default:
      cpu: "1000m"
      memory: "2Gi"
    defaultRequest:
      cpu: "100m"
      memory: "256Mi"
    type: Container
  - max:
      cpu: "2000m"
      memory: "4Gi"
    min:
      cpu: "50m"
      memory: "128Mi"
    type: Container
