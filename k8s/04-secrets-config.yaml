---
apiVersion: v1
kind: Secret
metadata:
  name: scanner-secrets
  namespace: stellar-security-scanner
type: Opaque
stringData:
  database-url: "postgresql://user:password@postgres:5432/scanner_db"
  redis-url: "redis://redis:6379"
  jwt-secret: "your-super-secret-jwt-key-here"
  api-token: "your-api-token-here"
---
apiVersion: v1
kind: Secret
metadata:
  name: scanner-kubeconfig
  namespace: stellar-security-scanner
type: Opaque
stringData:
  config: |
    apiVersion: v1
    kind: Config
    clusters:
    - cluster:
        server: https://kubernetes.default.svc
        certificate-authority: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
      name: in-cluster
    contexts:
    - context:
        cluster: in-cluster
        user: scanner
        namespace: stellar-security-scanner
      name: scanner-context
    current-context: scanner-context
    users:
    - name: scanner
      user:
        tokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: scanner-config
  namespace: stellar-security-scanner
data:
  scanner.yaml: |
    # Default scanner configuration
    max_concurrent_scans: 10
    default_cpu_limit: "1000m"
    default_memory_limit: "2Gi"
    default_timeout: "600s"
    encrypt_volumes: true
    block_egress: true
    log_level: "info"
    
    # Resource quotas per scan
    scan_resource_quotas:
      cpu: "1000m"
      memory: "2Gi"
      pods: "2"
    
    # Network policies
    network_policies:
      block_egress: true
      allow_ingress_from:
        - "stellar-security-scanner"
        - "kube-system"
    
    # Cleanup settings
    cleanup:
      max_age_minutes: 30
      cleanup_interval: "15m"
      failed_pod_cleanup: true
