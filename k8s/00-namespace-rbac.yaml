---
apiVersion: v1
kind: Namespace
metadata:
  name: stellar-security-scanner
  labels:
    app: stellar-security-scanner
    managed-by: scanner
    environment: production
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: scanner-sa
  namespace: stellar-security-scanner
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: scanner-role
rules:
- apiGroups: [""]
  resources: ["namespaces", "pods", "services"]
  verbs: ["create", "delete", "get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get"]
- apiGroups: ["policy"]
  resources: ["resourcequotas"]
  verbs: ["create", "delete", "get", "list", "watch"]
- apiGroups: ["networking.k8s.io"]
  resources: ["networkpolicies"]
  verbs: ["create", "delete", "get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["create", "delete", "get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: scanner-role-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: scanner-role
subjects:
- kind: ServiceAccount
  name: scanner-sa
  namespace: stellar-security-scanner
