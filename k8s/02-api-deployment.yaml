---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scanner-api
  namespace: stellar-security-scanner
  labels:
    app: stellar-security-scanner
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: stellar-security-scanner
      component: api
  template:
    metadata:
      labels:
        app: stellar-security-scanner
        component: api
    spec:
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app: stellar-security-scanner
            component: api
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  app: stellar-security-scanner
                  component: api
      serviceAccountName: scanner-sa
      containers:
      - name: api
        image: stellar-security-scanner-api:latest
        ports:
        - containerPort: 8080
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: scanner-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: scanner-secrets
              key: redis-url
        - name: SESSION_MODE
          value: stateless
        - name: SESSION_STORE_URL
          valueFrom:
            secretKeyRef:
              name: scanner-secrets
              key: redis-url
        - name: KUBECONFIG
          value: /etc/kubeconfig/config
        resources:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
        volumeMounts:
        - name: kubeconfig
          mountPath: /etc/kubeconfig
          readOnly: true
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: kubeconfig
        secret:
          secretName: scanner-kubeconfig
---
apiVersion: v1
kind: Service
metadata:
  name: scanner-api-service
  namespace: stellar-security-scanner
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
spec:
  selector:
    app: stellar-security-scanner
    component: api
  sessionAffinity: None
  externalTrafficPolicy: Cluster
  ports:
  - port: 80
    targetPort: 8080
  type: LoadBalancer
