---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: scanner-cleanup
  namespace: stellar-security-scanner
spec:
  schedule: "*/15 * * * *"  # Every 15 minutes
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: scanner-sa
          containers:
          - name: cleanup
            image: stellar-security-scanner-cleanup:latest
            command:
            - /bin/sh
            - -c
            - |
              echo "Starting cleanup job at $(date)"
              # Clean up scan namespaces older than 30 minutes
              kubectl get namespaces -l app=stellar-security-scanner,managed-by=scanner \
                --no-headers | awk '{print $1}' | while read ns; do
                age=$(kubectl get namespace $ns -o jsonpath='{.metadata.creationTimestamp}' | \
                  xargs -I {} date -d {} +%s)
                current=$(date +%s)
                age_minutes=$(( (current - age) / 60 ))
                
                if [ $age_minutes -gt 30 ]; then
                  echo "Cleaning up old namespace: $ns (age: $age_minutes minutes)"
                  kubectl delete namespace $ns --ignore-not-found=true
                fi
              done
              
              # Clean up failed pods
              kubectl get pods -n stellar-security-scanner --field-selector=status.phase=Failed \
                --no-headers | awk '{print $1}' | while read pod; do
                echo "Cleaning up failed pod: $pod"
                kubectl delete pod $pod -n stellar-security-scanner --ignore-not-found=true
              done
              
              echo "Cleanup job completed at $(date)"
            resources:
              requests:
                cpu: "50m"
                memory: "128Mi"
              limits:
                cpu: "200m"
                memory: "256Mi"
          restartPolicy: OnFailure
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: scanner-api-hpa
  namespace: stellar-security-scanner
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: scanner-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
